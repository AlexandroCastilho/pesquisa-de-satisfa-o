<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa de Satisfação</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-2xl shadow-lg max-w-md w-full text-center border border-slate-100">
        <h1 class="text-2xl font-bold text-slate-800 mb-2">Como foi sua experiência?</h1>
        <p class="text-slate-500 mb-8">Sua opinião é muito importante para nós. Por favor, avalie nosso serviço.</p>

        <div class="flex justify-center space-x-2 md:space-x-4 mb-8 flex-row-reverse justify-center" id="estrelas-container">
            <button onclick="selecionarEstrela(5)" class="estrela text-4xl text-slate-300 hover:text-yellow-400 transition-colors" data-nota="5"><i class="fas fa-star"></i></button>
            <button onclick="selecionarEstrela(4)" class="estrela text-4xl text-slate-300 hover:text-yellow-400 transition-colors" data-nota="4"><i class="fas fa-star"></i></button>
            <button onclick="selecionarEstrela(3)" class="estrela text-4xl text-slate-300 hover:text-yellow-400 transition-colors" data-nota="3"><i class="fas fa-star"></i></button>
            <button onclick="selecionarEstrela(2)" class="estrela text-4xl text-slate-300 hover:text-yellow-400 transition-colors" data-nota="2"><i class="fas fa-star"></i></button>
            <button onclick="selecionarEstrela(1)" class="estrela text-4xl text-slate-300 hover:text-yellow-400 transition-colors" data-nota="1"><i class="fas fa-star"></i></button>
        </div>

        <button onclick="enviarVoto()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition duration-200">
            Enviar Avaliação
        </button>

        <p id="msg-agradecimento" class="hidden text-emerald-600 font-semibold text-lg"></p>
    </div>

    <script>
        // ATENÇÃO: Use a mesma URL da nuvem do GitHub que você usou no app.js
        const apiUrl = "https://ubiquitous-invention-7v76p7v44rwhx6px-8000.app.github.dev";
        
        let notaSelecionada = 0;
        
        function selecionarEstrela(nota) {
            notaSelecionada = nota;
            const estrelas = document.querySelectorAll('.estrela');
            estrelas.forEach((estrela, index) => {
                if (index < nota) {
                    estrela.classList.add('text-yellow-400');
                    estrela.classList.remove('text-slate-300');
                } else {
                    estrela.classList.add('text-slate-300');
                    estrela.classList.remove('text-yellow-400');
                }
            });
        }
        
        async function enviarVoto() {
            if (notaSelecionada === 0) {
                alert("Selecione uma nota!");
                return;
            }
            // Pega os IDs mágicos que vêm na URL do link
            const urlParams = new URLSearchParams(window.location.search);
            const pesquisaId = urlParams.get('pesquisa') || 1; 
            const clienteId = urlParams.get('cliente') || 1; // Usando 1 como padrão para facilitar o teste

            // Esconde as estrelas e mostra mensagem de carregando
            document.getElementById('estrelas-container').classList.add('hidden');
            const msgEl = document.getElementById('msg-agradecimento');
            msgEl.innerText = "Registrando sua nota...";
            msgEl.classList.remove('hidden');

            try {
                const response = await fetch(`${apiUrl}/respostas/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        pesquisa_id: parseInt(pesquisaId), 
                        cliente_id: parseInt(clienteId), 
                        nota: notaSelecionada 
                    })
                });

                if(response.ok) {
                    msgEl.innerText = "Muito obrigado pela sua avaliação! 🌟";
                } else {
                    msgEl.innerText = "Ops! Ocorreu um erro ao salvar o voto.";
                    msgEl.classList.add('text-red-600');
                }
            } catch (error) {
                msgEl.innerText = "Erro de conexão.";
                msgEl.classList.add('text-red-600');
            }
        }
    </script>
</body>
</html>
